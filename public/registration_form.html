<!-- Modal Window  -->
<div id="modalOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex justify-center items-center z-50">
    <div id="loginModal" class="bg-white shadow-md page_content py-3 flex flex-col items-center relative w-[90%] md:w-[40%]">
      <!-- Close button -->
      <div id="closeModal" class="close_btn absolute right-0 cursor-pointer mr-3">
        <i class="fa-solid fa-xmark text-2xl text-customBlue-100"></i>
      </div>
      
      <!-- Welcome text -->
      <h1 class="mt-8 mb-3 text-xl text-customBlue-100 font-semibold">Welcome back</h1>
  
      <!-- Social login -->
      <div class="social_login flex justify-center items-center gap-6 mb-5">
          <i class="fa-brands fa-google bg-customBlue-100 text-white p-2 rounded-[50%] cursor-pointer"></i>
          <i class="fa-brands fa-square-facebook bg-customBlue-100 text-white p-2 rounded-[50%] cursor-pointer"></i>
      </div>
  
      <!-- Email prompt text -->
      <div class="email_prompt flex items-center justify-center w-[80%]">
          <hr class="flex-grow border-customBlue-100">
          <span class="mx-4 text-gray-600">or use email</span>
          <hr class="flex-grow border-customBlue-100">
      </div>
      
      <!-- Input fields -->
      <div class="input_fields flex flex-col w-[80%] my-5">
          <label class="text-gray-600 mb-3" for="email">Email</label>
          <input class="border-b-2 border-customBlue-100 mb-3" type="email" name="email" id="email" placeholder="Enter your email">
          <label class="text-gray-600 mb-3" for="password">Password</label>
          <input class="border-b-2 border-customBlue-100 mb-3" type="password" name="password" id="password" placeholder="Enter your password">
      </div>
  
      <!-- Forget prompt -->
      <p class="text-gray-600 my-2">Forget Password?</p>
      <button id="loginBtn" class="font-semibold self-center rounded-lg my-3 w-[60%] bg-customBlue-100 text-white p-3 hover:bg-customBlue-200 hover:transition-all hover:ease-in-out" type="submit">Login</button>
      <p class="text-gray-600 my-2">Don't have an account? <a class="text-customBlue-100" href="registration_form.html">Sign Up</a></p>
    </div>
  </div>

    <!-- Main Section -->
    <div class="bg-gray-100 main_container flex flex-col justify-center min-h-screen items-center py-5 px-3">

        <!-- Form container -->
        <div class="bg-white shadow-md form_container flex flex-col items-center">
            <h1 class="mt-5 font-semibold text-xl text-customBlue-100 mb-5">Create an account</h1>
            <i class="text-2xl mb-5 text-customBlue-100 fa-regular fa-address-card ml-3"></i>
            <div class="form_content p-5 flex flex-col relative">
                <!-- form -->
                <form class="flex flex-col" action="">
                    <!-- name field -->
                    <label class="text-gray-600 mb-3" for="full_name">Full Name </label>
                    <input class="border-b-2 border-customBlue-100 mb-5" type="text" name="full_name" id="full_name" placeholder="Enter your name">
                    <label class="text-gray-600 mb-3" for="gender">Gender</label>
                    <!-- radio fields -->
                    <div class="radio-section mb-5 flex justify-start">
                        <div class="male mr-5">
                            <input type="radio" name="male" id="male">
                            <label class="text-gray-600 for="male">
                                Male    
                            </label>
                        </div>
                        <div class="female mr-5">
                            <input type="radio" name="female" id="female">
                            <label class="text-gray-600 for="female">
                                Female    
                            </label>
                        </div>
                        <div class="pnts">
                            <input type="radio" name="pnts" id="pnts">
                            <label class="text-gray-600 for="pnts">
                                Prefer not to say    
                            </label>
                        </div>
                    </div>
                    <!-- others field -->
                    <label class="text-gray-600 mb-3" for="email">Email </label>
                    <input class="border-b-2 border-customBlue-100 mb-3" type="email" name="email" id="email" placeholder="Enter your email">
                    <label class="text-gray-600 my-3" for="password">Password</label>
                    <input class="border-b-2 border-customBlue-100 mb-3" type="password" name="password" id="password" placeholder="Enter your password">
                    <label class="text-gray-600 my-3" for="confirm_password"> Confirm Password </label>
                    <input class="border-b-2 border-customBlue-100 mb-3" type="password" name="confirm_password" id="confirm_password" placeholder="Confirm your password">
                </form>
                <!-- terms and services -->
                <p class="text-gray-600 my-5">by creating this account you accept <a class="text-customBlue-100" href="#">terms</a> of <a class="text-customBlue-100" href="#">services</a></p>
                <!-- buttons -->
                <div class="buttons flex flex-col">
                    <button class="mb-3 font-semibold self-center w-[100%] rounded-lg bg-customBlue-100 text-white p-3 hover:bg-customBlue-200 hover:transition-all hover:ease-in-out" type="submit">Create an account</button>
                    <hr class="border-[5%] w-[100%] self-center border-blue-400 mb-3">
                    <button class="w-[100%] font-semibold mb-3 self-center rounded-lg border-2 border-customBlue-100 text-gray-600 p-3 hover:bg-customBlue-100 hover:text-white hover:transition-all hover:ease-in-out"><i class="fa-brands fa-google mr-3 text-lg"></i> Register with Google</button>
                    <button class="w-[100%] font-semibold mb-3 self-center rounded-lg border-2 border-customBlue-100 text-gray-600 p-3 hover:bg-customBlue-100 hover:text-white hover:transition-all hover:ease-in-out"><i class="fa-brands fa-square-facebook mr-3 text-lg"></i> Register with Facebook</button>
                </div>
                <p class="text-gray-600 mb-5 self-center mt-5">Already have an account? <a id="loginLink" class="text-customBlue-100" href="#">Login</a></p>
            </div>
        </div>
    </div>
